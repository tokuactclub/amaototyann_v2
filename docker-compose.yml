services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  app-dev:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./amaototyann:/app/amaototyann
    command: [".venv/bin/uvicorn", "amaototyann.server.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev
