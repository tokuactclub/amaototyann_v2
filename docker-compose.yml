services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  app-dev:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./amaototyann:/app/amaototyann
    command: [".venv/bin/uvicorn", "amaototyann.server.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev

  frontend-dev:
    image: node:22-slim
    working_dir: /frontend
    volumes:
      - ./frontend:/frontend
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev
